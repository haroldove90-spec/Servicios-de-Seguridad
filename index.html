<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CNLS - Valor - Lealtad - Excelencia</title>
    <!-- Favicon link pointing to the custom logo -->
    <link rel="icon" type="image/png" href="https://cossma.com.mx/cnls.png" />
    <!-- Progressive Web App configurations -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#EF4444" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CNLS" />
    <link rel="apple-touch-icon" href="https://cossma.com.mx/cnls.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('CNLS Service Worker registered successfully:', reg);
            })
            .catch(err => {
              console.error('CNLS Service Worker registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
